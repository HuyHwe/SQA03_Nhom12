spring:
  application:
    name: discovery-server
  cloud:
    loadbalancer:
      ribbon:
        enabled: false
server:
  port: ${PORT:2001}
eureka:
  instance:
    appname: discovery-server
    hostname: discovery-server
    prefer-ip-address: ${PREFER_IP_ADDRESS:true}
    ip-address: ${CLIENT_IP_ADDRESS:localhost}
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      default-zone: http://${EUREKA_URL:localhost}:${EUREKA_PORT:2001}/eureka

