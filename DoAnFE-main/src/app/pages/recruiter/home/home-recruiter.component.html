<div class="header-up-wrapper row">
  <app-header-up></app-header-up>
</div>
<div class="rounded-bottom min-h-screen">

  <!-- ================= BANNER & SEARCH (TOPCV STYLE) ================= -->
  <div class="hero-topcv">
    <div class="hero-inner">
      <!-- Title -->
      <div class="hero-text">
        <h1>
          Tìm việc khó có <span>Fjob</span> lo
        </h1>
        <p>
          Tiếp cận 60.000+ tin tuyển dụng việc làm mỗi ngày từ hàng nghìn doanh nghiệp uy tín tại Việt Nam
        </p>
      </div>

      <!-- Search box -->
      <form [formGroup]="searchForm" class="topcv-search-box">
        <div class="search-item job">
          <span class="icon">📋</span>
          <app-selection [selectedItem]="selectedJob" [items]="jobsList" [pageMenu]="pageMenu"
            (onChangeSelected)="onSelectJob($event)" (refetchScrollMenu)="refetchScrollMenu($event)">
          </app-selection>
        </div>

        <div class="divider"></div>

        <div class="search-item location">
          <span class="icon">📍</span>
          <app-selection-menu [selectedItem]="selectedProvince" [items]="provinces"
            (onChangeSelected)="onProvinceSelected($event)">
          </app-selection-menu>
        </div>

        <button type="button" class="btn-search" (click)="onValidate()">
          🔍 Tìm kiếm
        </button>
      </form>

      <!-- Gợi ý -->
      <div class="topcv-suggest">
        <span>Gợi ý:</span>
        <button (click)="onSuggestClick('Manual tester')">Manual tester</button>
        <button (click)="onSuggestClick('Tester')">Tester</button>
        <button (click)="onSuggestClick('Junior tester')">Junior tester</button>
        <button (click)="onSuggestClick('Kiểm thử xâm nhập')">Kiểm thử xâm nhập</button>
      </div>

      <!-- Slider -->
      <div class="topcv-slider">
        <div class="slider-track" [style.transform]="'translateX(-' + currentSlide * 100 + '%)'">
          <div class="slider-item" *ngFor="let slide of slides">
            <img [src]="slide.image" [alt]="slide.title" />
          </div>
        </div>
        <div class="slider-dots">
          <span *ngFor="let s of slides; let i = index" [class.active]="i === currentSlide" (click)="goToSlide(i)">
          </span>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="jobDefaultSource">
    <div class="mt-20">
      <div class="flex justify-between items-center w-full max-w-[1200px] mx-auto">
        <div class="flex-1 text-center">
          <span class="font-body font-semibold text-4xl not-italic text-black">Top ngành nghề nổi bật</span>
        </div>
        <div class="flex items-center gap-3 shrink-0 relative z-10">
          <button type="button"
            class="p-2 rounded-full border border-gray-300 hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed"
            aria-label="Prev" (click)="onPrevCategory()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="1.5" class="w-6 h-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"></path>
            </svg>
          </button>
          <span class="font-body font-semibold text-base">Trang {{ (categoryRef?.page || 0) + 1 }} / {{
            categoryRef?.totalPage || 1 }}</span>
          <button type="button"
            class="p-2 rounded-full border border-gray-300 hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed"
            aria-label="Next" (click)="onNextCategory()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="1.5" class="w-6 h-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5 15.75 12l-7.5 7.5"></path>
            </svg>
          </button>
        </div>
      </div>
      <app-category #categoryRef="category" [dataSource]="jobDefaultSource" [pageSize]="10"></app-category>
    </div>
  </div>
</div>
<!-- Thêm biểu đồ thống kê thông báo cho recruiter-->
<!-- <div *ngIf="authenticated" class="mt-10">
      <app-job-notification-chart></app-job-notification-chart>
    </div>  -->
<div class="mt-20">
  <div class="flex justify-center">
    <span class="font-body font-semibold text-4xl not-italic text-center justify-center text-black">{{ "topCandidateLbl"
      | translate }}</span>
  </div>

  <div class="mt-14" *ngIf="dataSource; else loadingCandidates">
    <app-candidate-items-list [dataSource]="dataSource" (changePage)="changePage($event)"
      (onViewDetailItem)="showDetailItem($event)" [currentPage]="pageNum"></app-candidate-items-list>
  </div>
  <ng-template #loadingCandidates>
    <div class="animate-pulse">
      <div class="h-20 bg-gray-200 rounded w-full mb-2"></div>
      <div class="h-20 bg-gray-200 rounded w-full mb-2"></div>
    </div>
  </ng-template>
  <div class="standout-candidates-wrapper">
    <app-standout-candidates></app-standout-candidates>
  </div>

</div>
<app-popup-search #popupSearch (validate)="onSearchJob($event)"></app-popup-search>
<app-footer></app-footer>
<app-loading #appLoading></app-loading>
