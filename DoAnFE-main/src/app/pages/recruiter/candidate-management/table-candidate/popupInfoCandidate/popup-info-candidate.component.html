<div class="popup-container fixed inset-0 z-[1000] overflow-y-auto" 
     id="popup-info-candidate" 
     [ngClass]="{'visible opacity-100': isOpen, 'invisible opacity-0': !isOpen}">
  
  <div class="fixed inset-0 bg-slate-900 bg-opacity-60 backdrop-blur-sm transition-opacity" (click)="closePopup()"></div>

  <div class="modal-wrapper flex min-h-screen items-center justify-center p-4">
    <div class="relative w-full max-w-5xl transform overflow-hidden rounded-2xl bg-white shadow-2xl transition-all border border-green-100">
      
      <div class="flex items-center justify-between px-6 py-5 bg-emerald-600 text-white">
        <div class="flex items-center gap-3">
          <h3 class="text-xl font-bold tracking-wide">
            {{ "infoCandidateLbl" | translate }}
          </h3>
        </div>
        <button 
          (click)="closePopup()" 
          class="group rounded-full p-2 hover:bg-white/20 transition-all duration-200 focus:outline-none"
        >
          <img src="../../../../../assets/icons/close.svg" alt="close" class="w-6 h-6 brightness-0 invert group-hover:scale-110 transition-transform">
        </button>
      </div>

      <div class="max-h-[75vh] overflow-y-auto p-4 md:p-6 bg-green-50/30">
        <div *ngIf="isOpen" class="animate-fade-in">
          <app-candidate-detail-info 
            #appCandidateDetailInfo 
            [jobDefaultId]="candidate?.jobDefaultId"
            [parentPageCode]="parentPageCode" 
            [status]="candidate?.status" 
            [isEditMode]="false"
            [freelancerId]="getCandidateId()" 
            (onInterview)="onInterview(1)">
          </app-candidate-detail-info>
        </div>
      </div>

      <div class="px-6 py-4 bg-white border-t border-gray-100 flex justify-end gap-3">
        <button 
          (click)="closePopup()"
          class="px-6 py-2 text-sm font-semibold text-emerald-700 bg-emerald-50 rounded-xl hover:bg-emerald-100 transition-colors border border-emerald-100"
        >
          Đóng cửa sổ
        </button>
      </div>
    </div>
  </div>
</div>

<app-popup-booking-interview [candidate]="candidate" #popupBookingInterview></app-popup-booking-interview>
