<div class="popup-container" id="popup-interview-result">
	<div class="modal">
		<div class="modal-inner center-pos">
			<div class="p-3 bg-blue rounded-top d-flex justify-content-between align-items-center position-relative">
				<span class="font-size-big font-weight-bold global-text-color-white">Kết quả phỏng vấn</span>
				<img type="button" (click)="closePopup()" src="../../../../../../assets/icons/white-close.svg"
					class="position-absolute top-0 end-0 p-3 cursor-pointer" style="cursor: pointer;">
			</div>
			<div class="p-4" *ngIf="!loading">
				<div class="popup-content w-full">
					<div class="flex flex-col gap-4">
						<!-- Radio buttons for Pass/Fail -->
						<div class="flex flex-col gap-3">
							<div class="text-base font-semibold" style="color: var(--ink);">Kết quả</div>
							<div class="flex flex-col gap-2">
								<label class="flex items-center gap-2 cursor-pointer">
									<input type="radio" name="interviewResult" value="PASS" 
										[checked]="interviewResult === 'PASS'"
										(change)="onResultChange('PASS')"
										class="cursor-pointer">
									<span class="text-base">Đạt</span>
								</label>
								<label class="flex items-center gap-2 cursor-pointer">
									<input type="radio" name="interviewResult" value="FAIL" 
										[checked]="interviewResult === 'FAIL'"
										(change)="onResultChange('FAIL')"
										class="cursor-pointer">
									<span class="text-base">Không đạt</span>
								</label>
							</div>
						</div>

						<!-- Feedback textarea -->
						<div class="flex flex-col gap-2">
							<div class="text-base font-semibold" style="color: var(--ink);">Feedback</div>
							<textarea 
								[(ngModel)]="feedback"
								class="w-full px-3 py-2 border rounded-lg outline-none resize-none"
								style="border: 1px solid var(--ink-divide); min-height: 100px;"
								placeholder="Nhập feedback cho ứng viên..."></textarea>
						</div>
					</div>
				</div>
			</div>
			<div class="p-4 d-flex justify-content-center" *ngIf="loading">
				<div class="spinner-border" role="status">
					<span class="sr-only">Đang lưu...</span>
				</div>
			</div>
			<div class="col-12 py-4 horizontal-center-pos" *ngIf="!loading">
				<div class="col-md-12 right-btn-wrapper horizontal-center-pos vertical-center-pos-1 d-flex gap-2">
					<button class="btn border-none font-size-small font-weight-bold global-text-color-white bg-blue px-5" 
						(click)="onSubmit(); $event.stopPropagation()">
						Gửi
					</button>
					<button class="btn border-none font-size-small font-weight-bold color-disable-text bg-disable px-5" 
						(click)="closePopup(); $event.stopPropagation()">
						{{ "close" | translate }}
					</button>
				</div>
			</div>
		</div>
	</div>
</div>
