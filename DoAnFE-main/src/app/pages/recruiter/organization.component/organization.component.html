<app-toast #appToast></app-toast>

<div class="p-6 bg-white rounded-2xl shadow-lg border border-gray-100 max-w-4xl mx-auto my-8">
  <h2 class="font-semibold text-2xl text-gray-800 mb-6 flex items-center gap-2">
    <span class="inline-block w-2 h-8 bg-blue-600 rounded-md"></span>
    Thông tin tổ chức
  </h2>

  <div *ngIf="!user.organizationId && !isOrgEditMode" class="text-center py-10">
    <span class="material-icons text-gray-300" style="font-size: 4rem;">corporate_fare</span>
    <p class="text-gray-500 my-4">Bạn chưa thiết lập tổ chức nào.</p>
    <button (click)="startAddOrg()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
      Thiết lập ngay
    </button>
  </div>

  <div *ngIf="user.organizationId && !isOrgEditMode" class="animate-fade-in">
    <div class="flex flex-col md:flex-row gap-8 items-start">
      <div class="w-full md:w-1/3 text-center">
        <div class="relative inline-block">
          <img *ngIf="organization.avatar" [src]="organization.avatar" class="w-40 h-40 object-cover rounded-2xl shadow-md border-4 border-white" />
          <div *ngIf="!organization.avatar" class="w-40 h-40 bg-gray-100 rounded-2xl flex items-center justify-center text-gray-400 border-2 border-dashed">
            <span class="material-icons" style="font-size: 3rem;">image</span>
          </div>
          <div class="absolute -bottom-2 -right-2 px-3 py-1 rounded-full text-xs font-bold shadow-sm"
               [ngClass]="organization.active ? 'bg-green-500 text-white' : 'bg-red-500 text-white'">
            {{ organization.active ? 'Đang hoạt động' : 'Tạm dừng' }}
          </div>
        </div>
      </div>

      <div class="w-full md:w-2/3 space-y-4">
        <h3 class="text-2xl font-bold text-gray-900">{{organization.name}}</h3>
        <p class="text-gray-600 leading-relaxed">{{organization.description || 'Chưa có mô tả'}}</p>

        <div class="flex gap-3 pt-6">
          <button (click)="startEditOrg()" class="bg-blue-50 text-blue-600 px-6 py-2 rounded-lg hover:bg-blue-600 hover:text-white transition">
            Chỉnh sửa
          </button>
          <button (click)="confirmLeaveOrg()" class="text-red-600 bg-red-50 px-6 py-2 rounded-lg hover:bg-red-600 hover:text-white transition">
            Rời khỏi
          </button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="isOrgEditMode" class="space-y-6 animate-fade-in">
    <div class="flex flex-col items-center pb-6 border-b border-gray-100">
      <div class="relative group cursor-pointer" (click)="fileInput.click()">
        <img [src]="imagePreview || 'assets/images/default-org.png'" class="w-32 h-32 object-cover rounded-full border-4 border-blue-50 shadow-lg" />
        <div class="absolute inset-0 bg-black bg-opacity-40 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
          <span class="material-icons text-white">photo_camera</span>
        </div>
      </div>
      <input #fileInput type="file" (change)="onFileSelected($event)" accept="image/*" class="hidden" />
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="md:col-span-2">
        <label class="block text-sm font-semibold text-gray-700 mb-1">Tên tổ chức *</label>
        <input [(ngModel)]="organization.name" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-400 outline-none" type="text" />
      </div>

      <div class="md:col-span-2">
        <label class="block text-sm font-semibold text-gray-700 mb-1">Mô tả chi tiết</label>
        <textarea [(ngModel)]="organization.description" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-400 outline-none" rows="3"></textarea>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Trạng thái</label>
        <select [(ngModel)]="organization.active" class="w-full border rounded-lg p-2 outline-none">
          <option [value]="1">Kích hoạt</option>
          <option [value]="0">Tạm dừng</option>
        </select>
      </div>
    </div>

    <div class="flex gap-4 pt-6">
      <button (click)="saveOrg()" [disabled]="loading" class="bg-blue-600 text-white flex-1 py-3 rounded-lg font-bold shadow-lg hover:bg-blue-700 disabled:bg-gray-400">
        {{ loading ? 'Đang lưu...' : 'Lưu thông tin' }}
      </button>
      <button (click)="cancelOrgEdit()" class="bg-gray-100 text-gray-600 flex-1 py-3 rounded-lg font-bold hover:bg-gray-200">
        Hủy bỏ
      </button>
    </div>
  </div>
</div>
