<div class="relative rounded-lg border border-gray-200 bg-white hover:shadow cursor-pointer" (click)="viewDetailItem()">
  <div class="absolute bottom-2 right-2 flex items-center gap-1">
    
    <button type="button"
      class="w-8 h-8 flex items-center justify-center rounded-md bg-gray-50 border border-gray-200 hover:bg-gray-100"
      (click)="deleteItem($event)" aria-label="Delete">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
        class="w-5 h-5 text-gray-600">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 6h18" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 6v-1a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v1" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 11v6M14 11v6" />
      </svg>
    </button>
  </div>
  <div class="p-4 flex items-start">
    <div
  class="flex-shrink-0 w-16 h-16 rounded-md overflow-hidden bg-gray-50 border border-gray-200 flex items-center justify-center">
  <img class="max-h-12 max-w-12" [src]="item.organizationAvatar || '../assets/icons/home.svg'" alt="logo" />
</div>

    <div class="ml-4 flex-1 min-w-0">
      <div class="text-base font-semibold text-gray-900 truncate" [title]="item.name">{{ item.name }}</div>
      <div class="text-sm text-gray-600 truncate" [title]="item.job">{{ item.job }}</div>
      <div class="text-xs text-gray-500 mt-1">{{ item.ward }}, {{ item.province }}</div>
      <div class="mt-2 flex gap-2">
        <span *ngIf="item.workingType == 0 || item.workingType == null"
          class="text-xs bg-yellow-50 text-yellow-700 px-2 py-0.5 rounded">{{ 'partTimeLbl' | translate }}</span>
        <span *ngIf="item.workingType == 1" class="text-xs bg-yellow-50 text-yellow-700 px-2 py-0.5 rounded">{{
          'fullTimeLbl' | translate }}</span>
      </div>
    </div>
    <div class="ml-4 text-right">
      <div class="text-[var(--light-orange)] font-semibold">
        {{ formatSalary(item.salary) }} VNĐ
      </div>
      <div class="text-xs text-gray-500">{{ item.expdate }}</div>
    </div>
  </div>
</div>
