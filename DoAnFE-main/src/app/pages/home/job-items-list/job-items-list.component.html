<app-toast #appToast [messageCode]=""></app-toast>

<div class="w-full max-w-[1200px] mx-auto">

  <!-- ================= LIST JOB ================= -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div *ngFor="let i of data; let idx = index">
      <app-item
        [item]="i"
        (viewDetail)="openPopupDetailItem($event)"
        (delete)="onDeleteItem(idx)">
      </app-item>
    </div>

    <!-- placeholders to keep height on last page when < pageSize -->
    <div
      *ngFor="let _ of placeholderArray"
      class="rounded-lg border border-transparent h-[120px] opacity-0">
    </div>
  </div>

  <!-- ================= EMPTY STATE ================= -->
  <div
    *ngIf="data.length == 0"
    class="text-[60px] text-center text-gray-300 font-extrabold">
    Không tìm thấy công việc phù hợp
  </div>

  <!-- ================= PAGINATION ================= -->
  <div class="paginator-wrapper flex justify-center p-4">
    <ul class="pagination flex items-center gap-2">

      <!-- Prev -->
      <li>
        <button
          type="button"
          (click)="onPrePageClick()"
          [disabled]="isJobListPrevDisabled"
          class="px-2 py-1 rounded
                 border border-gray-300
                 bg-white
                 hover:bg-[#e6f7ef]
                 disabled:opacity-50 disabled:cursor-not-allowed
                 transition">
          <img src="../assets/img/back.png" class="h-4" alt="Prev">
        </button>
      </li>

      <!-- Page numbers -->
      <li
        *ngFor="let i of arrPage"
        (click)="onCurrentPageClick(i)"
        class="cursor-pointer"
      >
        <a
          *ngIf="isDisplayPageNumber(i)"
          class="min-w-[36px] h-[36px]
                 flex items-center justify-center
                 rounded-md
                 text-sm font-medium
                 border
                 border-gray-300
                 transition-all duration-200
                 text-gray-700
                 hover:bg-[#e6f7ef]
                 hover:text-[#00b14f]
                 hover:border-[#00b14f]"
          [ngClass]="{
            'bg-[#00b14f] border-[#00b14f] text-white hover:bg-[#00b14f] hover:text-white':
              currentPage === i
          }"
        >
          {{ i }}
        </a>
      </li>

      <!-- Next -->
      <li>
        <button
          type="button"
          (click)="onNextPageClick()"
          [disabled]="isJobListNextDisabled"
          class="px-2 py-1 rounded
                 border border-gray-300
                 bg-white
                 hover:bg-[#e6f7ef]
                 disabled:opacity-50 disabled:cursor-not-allowed
                 transition">
          <img src="../assets/img/next.png" class="h-4" alt="Next">
        </button>
      </li>

    </ul>
  </div>

</div>

<!-- ================= POPUP DETAIL ================= -->
<app-popup-detail-item
  (applyInform)="showInfoSuccessfullyApply($event)"
  (openPopupConfirm)="showPopupConfirmApply($event)"
  #popupDetailItem>
</app-popup-detail-item>
