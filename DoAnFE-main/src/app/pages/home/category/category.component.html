<div class="flex justify-center p-3 w-full md:w-auto">
  <div *ngIf="loading" class="text-center py-5">Đang tải...</div>
  <div *ngIf="!loading" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6 py-5 px-4 sm:px-6 rounded-xl bg-white w-full max-w-[1200px] mx-auto justify-center" style="min-height: 500px;">
    <div (click)="gotoOtherPage(item)"
         class="item flex flex-col cursor-pointer items-center px-6 py-3 gap-2 rounded-md bg-white transition-all duration-200 hover:bg-[var(--light-pink)] hover:shadow-md hover:border-blue-500 h-[200px] w-full overflow-hidden"
         style="border: 1px solid var(--orange-orange-300);" *ngFor="let item of displayed">
      <div class="flex justify-center items-center p-2 rounded-full h-20 w-full" style="background: var(--light-pink);">
        <img [src]="item.icon || resolveIcon(item.name)" [alt]="item.name" class="w-16 h-16" (error)="onImgError($event)" />
      </div>
      <span class="font-body font-semibold text-base text-center not-italic item-title" style="color: var(--orange);">{{ item.name }}</span>
    </div>
    
    <!-- Placeholder items to maintain grid layout when less than 10 items -->
    <div class="item-placeholder h-[200px] w-full" *ngFor="let placeholder of getPlaceholderCount()"></div>
  </div>
</div>
