<div class="container mx-auto p-6 max-w-4xl">
  <!-- Tiêu đề -->
  <h2 class="text-3xl font-bold text-gray-800 mb-6">{{ 'notifications' | translate }}</h2>

  <!-- Thông báo lỗi -->
  <div *ngIf="errorMessage" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded-md mb-6">
    {{ errorMessage | translate }}
  </div>

  <!-- Thông báo không có dữ liệu -->
  <div *ngIf="notifications.length === 0 && !errorMessage" class="text-center text-gray-500 bg-gray-50 p-6 rounded-md">
    <i class="fas fa-bell-slash text-gray-400 text-2xl mb-2"></i>
    <p>{{ 'noNotifications' | translate }}</p>
  </div>

  <!-- Danh sách thông báo -->
  <div class="space-y-4">
    <div *ngFor="let notification of notifications"
         class="relative p-5 bg-white border border-gray-200 rounded-lg shadow-sm hover:shadow-md transition-shadow duration-200"
         [ngClass]="{'border-l-4 border-blue-500': notification.status === 'UNREAD'}">
      <div class="flex items-start space-x-4">
        <!-- Biểu tượng thông báo -->
        <div class="flex-shrink-0">
          <i class="fas fa-bell text-blue-500 text-lg" [ngClass]="{'text-gray-400': notification.status === 'READ'}"></i>
        </div>
        <!-- Nội dung thông báo -->
        <div class="flex-1">
          <div class="flex justify-between items-start">
            <div>
              <p class="text-lg font-semibold text-gray-800">{{ notification.title }}</p>
              <p class="text-gray-600 mt-1">{{ notification.message }}</p>
              <p class="text-xs text-gray-400 mt-2">{{ notification.createdAt | date:'medium' }}</p>
            </div>
            <!-- Nút Mark as Read -->
            <button
              *ngIf="notification.status === 'UNREAD'"
              (click)="markAsRead(notification.id)"
              class="flex items-center text-xs text-blue-600 hover:text-blue-800 hover:underline transition-colors duration-200">
              <i class="fas fa-check-circle mr-1"></i>
              {{ 'markAsRead' | translate }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
