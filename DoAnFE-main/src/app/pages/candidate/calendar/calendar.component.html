<div class="calendar-page-container h-screen flex flex-col p-4 bg-[#f4f7fe]">
    <div class="flex items-center justify-between mb-4 bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex-shrink-0">
        <h1 class="text-xl font-bold text-[#1b2559]">
            {{ "calendarLbl" | translate }}
        </h1>
        
        <form [formGroup]="dateForm" class="flex items-center gap-3">
            <div class="flex flex-col border-r pr-3 border-gray-100">
                <label class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">{{ "startDate" | translate }}</label>
                <input 
                    type="date" 
                    formControlName="startDate"
                    [(ngModel)]="startDate"
                    (change)="onChoseStartDate(startDate)"
                    class="text-sm font-medium outline-none"
                />
            </div>
            <button type="button" (click)="onSearch()" 
                class="px-5 py-2 bg-[#00b14f] text-white font-bold rounded-lg hover:bg-[#008e3f] transition-all active:scale-95 shadow-sm">
                {{ "search" | translate }}
            </button>
        </form>
    </div>

    <div class="flex-grow bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden relative">
        <full-calendar #fullCalendar [options]="calendarOptions"></full-calendar>
    </div>
</div>

<app-popup-calendar-item #popupCalendarItem></app-popup-calendar-item>
<app-popup-interview-result #popupInterviewResult></app-popup-interview-result>
