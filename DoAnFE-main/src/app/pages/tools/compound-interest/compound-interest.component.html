<div class="header-up-wrapper">
  <app-header-up></app-header-up>
</div>
<div class="min-h-screen flex items-start justify-center pt-16 bg-blue ">
  <div class="calculator-card">
    <h1 class="title">💰 Công cụ tính Lãi Kép & Đầu tư</h1>

    <div class="form-grid">
      <!-- Số tiền gốc -->
      <div class="form-group">
        <label>
          Số tiền gốc (VNĐ)
          <span class="required">*</span>
        </label>
        <input type="number" [(ngModel)]="step1" placeholder="Ví dụ: 10,000,000" />
        <small class="error" *ngIf="errors.step1">
          Trường này là bắt buộc
        </small>
      </div>

      <!-- Góp mỗi tháng -->
      <div class="form-group">
        <label>
          Góp mỗi tháng (VNĐ)
          <span class="required">*</span>
        </label>
        <input type="number" [(ngModel)]="step2" placeholder="Ví dụ: 1,000,000" />
        <small class="error" *ngIf="errors.step2">
          Trường này là bắt buộc
        </small>
      </div>

      <!-- Thời gian + Lãi suất -->
      <div class="form-row">
        <div class="form-group">
          <label>
            Thời gian (năm)
            <span class="required">*</span>
          </label>
          <input type="number" [(ngModel)]="years" placeholder="10" />
          <small class="error" *ngIf="errors.years">
            Trường này là bắt buộc
          </small>
        </div>

        <div class="form-group">
          <label>
            Lãi suất (%/năm)
            <span class="required">*</span>
          </label>
          <input type="number" [(ngModel)]="interestRate" placeholder="1" />
          <small class="error" *ngIf="errors.interestRate">
            Trường này là bắt buộc
          </small>
        </div>
      </div>

      <!-- Kỳ ghép lãi -->
     <div class="form-group">
  <label>
    Kỳ ghép lãi
    <span class="required">*</span>
  </label>

  <div class="select-wrapper">
    <select [(ngModel)]="period">
      <option value="" disabled hidden>
        Chọn kỳ ghép lãi
      </option>
      <option value="year">Hàng năm</option>
      <option value="month">Hàng tháng</option>
    </select>
  </div>

  <small class="error" *ngIf="errors.period">
    Trường này là bắt buộc
  </small>
</div>


      <!-- Nút tính -->
      <button (click)="onSubmit()" class="btn-calc">
        Tính toán ngay
      </button>
    </div>

    <!-- Kết quả -->
    <div *ngIf="result > 0" class="mt-10">
      <h2 class="text-2xl font-bold mb-4 text-center text-gray-800">
        Kết quả sau {{ years }} năm:
        <span class="text-blue-600">{{ result | number }} VNĐ</span>
      </h2>
      <div class="chart-container mx-auto w-full h-[350px]">
        <canvas #chartCanvas></canvas>
      </div>
    </div>
  </div>
</div>

<app-footer></app-footer>
